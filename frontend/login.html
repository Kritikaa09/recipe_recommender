<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — RecipeSphere</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="nav small">
<div class="brand">RecipeSphere</div>
<nav>
<a href="index.html">Home</a>
<a href="signup.html">Sign up</a>
</nav>
</header>


<main class="center-card">
<div class="card">
<h2>Welcome back</h2>
<p class="muted">Login to access the full recommender and save ratings.</p>
<label>Email</label>
<input id="li_email" type="email" placeholder="you@example.com">
<label>Password</label>
<input id="li_password" type="password" placeholder="Your password">
<button class="btn btn-primary" onclick="login()">Login</button>
<p class="muted">No account yet? <a href="signup.html">Sign up</a></p>
</div>
</main>


<script src="script.js"></script>
</body>
</html>
