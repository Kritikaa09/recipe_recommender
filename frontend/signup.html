<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign up — RecipeSphere</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="nav small">
<div class="brand">RecipeSphere</div>
<nav>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
</nav>
</header>


<main class="center-card">
<div class="card">
<h2>Create your account</h2>
<p class="muted">Sign up to save ratings and get personalized recommendations.</p>
<label>Email</label>
<input id="su_email" type="email" placeholder="you@example.com">
<label>Password</label>
<input id="su_password" type="password" placeholder="Choose a secure password">
<button class="btn btn-primary" onclick="signup()">Sign up</button>
<p class="muted">Already have an account? <a href="login.html">Login</a></p>
</div>
</main>


<script src="script.js"></script>
</body>
</html>
